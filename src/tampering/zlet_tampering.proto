syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).long_names = false;

message Tampering {
  message Config {
    int32 light_tamper_threshold = 1;
    int32 proximity_tamper_threshold = 2;
  }

  message Events {
    int32 timestamp = 1;
    bool light_tamper_detected = 2;
    bool proximity_tamper_detected = 3;
    bool contact_tamper_detected = 4;
  }
}

/*
 * force_tampering returns Empty in v0.3 — the tamper signal is
 * delivered on the events channel (where all async fan-out lives),
 * not as the RPC's return value.
 */
service TamperingApi {
  rpc start(Empty) returns (Lifecycle.Status);
  rpc stop(Empty) returns (Lifecycle.Status);
  rpc get_status(Empty) returns (Lifecycle.Status);
  rpc config(Tampering.Config) returns (Tampering.Config);
  rpc get_config(Empty) returns (Tampering.Config);
  rpc force_tampering(Empty) returns (Empty);
}
