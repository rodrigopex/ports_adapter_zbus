syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgZletStorage {
    message Config {
        int32 max_entries = 1; /* Read-only capacity (compile-time fixed) */
    }

    message Events {
        int32 timestamp = 1;
        optional bool storage_full = 2;
        optional string error_message = 3 [(nanopb).max_size = 64];
    }

    message KeyValue {
        string key = 1 [(nanopb).max_size = 32];
        bytes value = 2 [(nanopb).max_size = 256];
        int32 value_size = 3;
    }

    message StorageEntry {
        string key = 1 [(nanopb).max_size = 32];
        bytes value = 2 [(nanopb).max_size = 256];
        int32 value_size = 3;
        bool found = 4;
    }

    message StorageStats {
        int32 total_entries = 1;
        int32 max_entries = 2;
        int32 total_bytes_used = 3;
    }

    message Invoke {
        oneof storage_invoke {
            Empty start = 1;
            Empty stop = 2;
            Empty get_status = 3;
            Config config = 4;
            Empty get_config = 5;
            Empty get_events = 6;
            KeyValue store = 7;
            KeyValue retrieve = 8;
            Empty clear = 9;
            Empty get_storage_stats = 10;
        }
    }

    message Report {
        oneof storage_report {
            MsgZephletStatus status = 1;
            Config config = 2;
            Events events = 3;
            StorageEntry storage_entry = 4;
            StorageStats storage_stats = 5;
        }
    }
}

service Storage {

    rpc start (Empty) returns (MsgZephletStatus);
    rpc stop (Empty) returns (MsgZephletStatus);
    rpc get_status (Empty) returns (MsgZephletStatus);
    rpc config (MsgZletStorage.Config) returns (MsgZletStorage.Config);
    rpc get_config (Empty) returns (MsgZletStorage.Config);
    rpc store (MsgZletStorage.KeyValue) returns (Empty);
    rpc retrieve (MsgZletStorage.KeyValue) returns (MsgZletStorage.StorageEntry);
    rpc clear (Empty) returns (Empty);
    rpc get_storage_stats (Empty) returns (MsgZletStorage.StorageStats);
    /* This will report the storage events */
    rpc get_events (Empty) returns (stream MsgZletStorage.Events);

}
