syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgZletBattery {
    message Config {
      int32 voltage_operation = 1; /* In millivolts */
      int32 low_battery_threshold = 2; /* In percentage */
    }

    message BatteryState {
      int32 voltage = 1;
      int32 temperature = 2;
      bool is_charging = 3;
    }

    message Events {
      int32 timestamp = 1;
      optional bool low_battery = 2;
    }

    message Invoke {
        optional MsgAPIContext context = 999;  /* For correlation tracking */
        oneof battery_invoke {
            Empty start = 1;
            Empty stop = 2;
            Empty get_status = 3;
            Config config = 4;
            Empty get_config = 5;
            Empty get_events = 6;
            /* Custom commands start at 7+ */
            Empty get_battery_state = 7;
        }
    }

    message Report {
        optional MsgAPIContext context = 999;  /* Present only for invoke responses */
        oneof battery_report {
            MsgZephletStatus status = 1;
            Config config = 2;
            Events events = 3;
            /* Custom reports start at 4+ */
            BatteryState battery_state = 4;
        }
    }
}

service Battery {
  rpc start (Empty) returns (MsgZephletStatus);
  rpc stop (Empty) returns (MsgZephletStatus);
  rpc get_status (Empty) returns (MsgZephletStatus);
  rpc config (MsgZletBattery.Config) returns (MsgZletBattery.Config);
  rpc get_config (Empty) returns (MsgZletBattery.Config);
  rpc get_battery_state (Empty) returns (MsgZletBattery.BatteryState);
  /* This will report the battery events */
  rpc get_events (Empty) returns (stream MsgZletBattery.Events);
}
