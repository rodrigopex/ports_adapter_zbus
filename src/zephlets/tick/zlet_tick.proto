syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).anonymous_oneof = true;
option (nanopb_fileopt).long_names = false;

message Tick {
  message Config {
    uint32 delay_ms = 1;
  }

  message Events {
    int32 timestamp = 1;
    optional Empty tick = 2;
  }
}

service Tick {
  option (zephlet.extends_base) = true;
}
