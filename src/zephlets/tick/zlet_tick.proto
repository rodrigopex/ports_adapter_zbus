syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).anonymous_oneof = true;
option (nanopb_fileopt).long_names = false;

message Tick {
  /* Runtime settings. Every field MUST be `optional` so update_settings
   * can apply partial merges via nanopb has_<field> flags. */
  message Settings {
    optional uint32 delay_ms = 1;     /* tick period */
    optional uint32 max_delay_ms = 2; /* upper bound; delay_ms <= max_delay_ms */
  }

  message Events {
    int32 timestamp = 1;
    optional Empty tick = 2;
  }
}

service Tick {
  option (zephlet.extends_base) = true;
}
