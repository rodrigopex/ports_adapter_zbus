syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).anonymous_oneof = true;
option (nanopb_fileopt).long_names = false;

message Tick {
  message Config {
    uint32 period_ms = 1;
    uint32 max_period_ms = 2;
  }

  message Events {
    int32 timestamp = 1;
  }
}

/*
 * Service is informational in v0.3 — nanopb does not generate code for it.
 * Method ids are allocated in declaration order starting at 1 and mirrored
 * by hand in zlet_tick_interface.h. A future codegen pass will consume this
 * block directly.
 */
service TickApi {
  rpc start      (Empty)        returns (ZephletStatus);
  rpc stop       (Empty)        returns (ZephletStatus);
  rpc get_status (Empty)        returns (ZephletStatus);
  rpc config     (Tick.Config)  returns (Tick.Config);
  rpc get_config (Empty)        returns (Tick.Config);
}
