syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgZletUi {
  message Config {
    // No configuration needed yet
  }

  message Events {
    int32 timestamp = 1;
    optional uint32 blink = 2;
  }

  message Invoke {
    optional MsgAPIContext context = 999; /* For correlation tracking */
    oneof ui_invoke {
      Empty start = 1;
      Empty stop = 2;
      Empty get_status = 3;
      Config config = 4;
      Empty get_config = 5;
      Empty get_events = 6;
      Empty blink = 7;
    }
  }

  message Report {
    optional MsgAPIContext context = 999; /* Present only for invoke responses */
    oneof ui_report {
      MsgZephletStatus status = 1;
      Config config = 2;
      Events events = 3;
    }
  }
}

service UI {
  rpc start(Empty) returns (MsgZephletStatus);
  rpc stop(Empty) returns (MsgZephletStatus);
  rpc get_status(Empty) returns (MsgZephletStatus);
  rpc config(MsgZletUi.Config) returns (MsgZletUi.Config);
  rpc get_config(Empty) returns (MsgZletUi.Config);
  rpc get_events(Empty) returns (stream MsgZletUi.Events);
  rpc blink(Empty) returns (Empty);
}
