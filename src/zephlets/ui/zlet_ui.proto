syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).anonymous_oneof = true;
option (nanopb_fileopt).long_names = false;

message Ui {
  enum BuzzerTone {
    BUZZER_TONE_1 = 0;
    BUZZER_TONE_2 = 1;
    BUZZER_TONE_3 = 2;
    BUZZER_TONE_4 = 3;
  }

  enum UserButtonEvents {
    USER_BUTTON_EVENT_NONE = 0;
    USER_BUTTON_EVENT_PRESSED = 1;
    USER_BUTTON_EVENT_RELEASED = 2;
    USER_BUTTON_EVENT_LONG_PRESSED = 3;
  }

  message Config {
    int32 user_button_long_press_duration = 1;
  }

  message Events {
    int32 timestamp = 1;
    optional uint32 blink = 2;
    optional UserButtonEvents user_button_event = 3;
  }
}

service UI {
  option (zephlet.extends_base) = true; /* Extends base zlet */
  // The following RPCs are going to be generated in this zlet proto
  // rpc start(Empty) returns (MsgZephletStatus);
  // rpc stop(Empty) returns (MsgZephletStatus);
  // rpc get_status(Empty) returns (MsgZephletStatus);
  // rpc config(MsgZletUi.Config) returns (Ui.Config);
  // rpc get_config(Empty) returns (Ui.Config);
  // rpc get_last_event(Empty) returns (Ui.Events);
  rpc blink(Empty) returns (Empty);
  rpc buzzer_play(Ui.BuzzerTone) returns (Empty);
}
