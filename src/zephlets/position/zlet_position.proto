syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgZletPosition {
    message Config {
        // TODO: Add configuration fields specific to Position
    }

    message Events {
        // TODO: Add event fields specific to Position
    }

    message Invoke {
        oneof position_invoke {

            Empty start = 1;
            Empty stop = 2;
            Empty get_status = 3;
            Config config = 4;
            Empty get_config = 5;
            Empty get_events = 6;

        }
    }

    message Report {
        oneof position_report {
            MsgZephletStatus status = 1;
            Config config = 2;
            Events events = 3;
        }
    }
}

service Position {

    rpc start (Empty) returns (MsgZephletStatus);
    rpc stop (Empty) returns (MsgZephletStatus);
    rpc get_status (Empty) returns (MsgZephletStatus);
    rpc config (MsgZletPosition.Config) returns (MsgZletPosition.Config);
    rpc get_config (Empty) returns (MsgZletPosition.Config);
    /* This will report the position events */
    rpc get_events (Empty) returns (stream MsgZletPosition.Events);

}
