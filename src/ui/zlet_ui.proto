syntax = "proto3";

import "nanopb.proto";
import "zephlet.proto";

option (nanopb_fileopt).long_names = false;

message Ui {
  enum UserButtonEvents {
    USER_BUTTON_EVENT_NONE = 0;
    USER_BUTTON_EVENT_PRESSED = 1;
    USER_BUTTON_EVENT_RELEASED = 2;
    USER_BUTTON_EVENT_LONG_PRESSED = 3;
  }

  message Config {
    uint32 user_button_long_press_duration = 1;
  }

  message Events {
    int32 timestamp = 1;
    uint32 blink = 2;
    UserButtonEvents user_button_event = 3;
  }
}

/*
 * Service is informational in v0.3 — nanopb does not generate code for it.
 * Method ids are allocated in declaration order starting at 1.
 * buzzer_play is deferred — the current generator does not yet support
 * enum-typed RPC inputs; will return as a nested-message input when added.
 */
service UiApi {
  rpc start(Empty) returns (Lifecycle.Status);
  rpc stop(Empty) returns (Lifecycle.Status);
  rpc get_status(Empty) returns (Lifecycle.Status);
  rpc config(Ui.Config) returns (Ui.Config);
  rpc get_config(Empty) returns (Ui.Config);
  rpc blink(Empty) returns (Empty);
}
