syntax = "proto3";

import "google/protobuf/descriptor.proto";

package zephlet;

// Custom options for automatic lifecycle field injection
// These options mark messages/services for code generation preprocessing

// Mark Invoke message for lifecycle command injection
// Generator injects: start=1, stop=2, get_status=3, config=4, get_config=5, get_events=6
extend google.protobuf.MessageOptions {
  bool lifecycle_invoke = 50001;
}

// Mark Report message for lifecycle report injection
// Generator injects: status=1, config=2, events=3
extend google.protobuf.MessageOptions {
  bool lifecycle_report = 50002;
}

// Mark service for lifecycle RPC injection
// Generator injects: start, stop, get_status, config, get_config, get_events RPCs
extend google.protobuf.ServiceOptions {
  bool lifecycle_service = 50003;
}
