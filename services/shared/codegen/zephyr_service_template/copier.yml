# Copier template configuration for Zephyr Service Module
_templates_suffix: .jinja
_subdirectory: template

# Questions to ask when generating the template
service_name:
  type: str
  help: What is the name of your service? (e.g., UI, Battery, Sensor)
  placeholder: UI

service_name_clean:
  type: str
  help: Service name with spaces removed (auto-generated if left empty)
  default: "{{ service_name | replace(' ', '_') }}"
  when: false # Auto-computed, not asked

service_name_trim:
  type: str
  help: Service name with spaces removed (auto-generated if left empty)
  default: "{{ service_name | replace(' ', '') }}"
  when: false # Auto-computed, not asked

service_name_lower:
  type: str
  help: Service name in lowercase (auto-generated if left empty)
  default: "{{ service_name_clean | lower }}"
  when: false # Auto-computed, not asked

service_name_upper:
  type: str
  help: Service name in uppercase (auto-generated if left empty)
  default: "{{ service_name_clean | upper }}"
  when: false # Auto-computed, not asked

service_name_pascal:
  type: str
  help: Service name in PascalCase (auto-generated if left empty)
  default: "{{ service_name_clean | replace('_', ' ') | title | replace(' ', '') }}"
  when: false # Auto-computed, not asked

service_description:
  type: str
  help: Brief description of your service
  default: "{{ service_name }} Service Module"
  placeholder: "Provides user interface functionalities for the application"

include_basic_commands:
  type: bool
  help: Include the basic commands?
  default: true

author_name:
  type: str
  help: Author name (optional)
  default: ""

year:
  type: str
  help: Copyright year
  default: "{{ '%Y' | strftime }}"
