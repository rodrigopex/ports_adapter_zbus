syntax = "proto3";

import "nanopb.proto";
import "service.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgTamperDetectionService {
    message Invoke {
        oneof tamper_detection_invoke {

            Void start = 1;
            Void stop = 2;

        }
    }

    message Report {
        oneof tamper_detection_report {
            MsgServiceStatus status = 1;
        }
    }
}
