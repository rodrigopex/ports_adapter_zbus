syntax = "proto3";

import "nanopb.proto";
import "service.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgTickService {
  message Config {
    uint32 delay_ms = 1;
  }

  message Events {
    int32 timestamp = 1;
    optional int64 tick = 2;
  }

  message Invoke {
    oneof tick_invoke {
      Empty start = 1;
      Empty stop = 2;
      Empty get_status = 3;
      Config config = 4;
      Empty get_config = 5;
      Empty get_events = 6;
    }
  }

  message Report {
    oneof tick_report {
      MsgServiceStatus status = 1;
      Config config = 2;
      Events events = 3;
    }
  }
}

service TickService {
  rpc start (Empty) returns (MsgServiceStatus);
  rpc stop (Empty) returns (MsgServiceStatus);
  rpc get_status (Empty) returns (MsgServiceStatus);
  rpc config (MsgTickService.Config) returns (MsgTickService.Config);
  rpc get_config (Empty) returns (MsgTickService.Config);
  /* This will report the tick events */
  rpc get_events (Empty) returns (stream MsgTickService.Events);
}
