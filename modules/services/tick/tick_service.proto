syntax = "proto3";

import "nanopb.proto";
import "service.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgTickService {
    message Empty {}

    message Status {
      bool is_running = 1;
    }

    message Config {
      /* In milliseconds */
      uint32 delay_ms = 1;
    }

    message Invoke {
        oneof tick_invoke {
            Config start = 2;
            Empty stop = 3;
        }
    }

    message Report {
        oneof tick_report {
            MsgService.Status status = 1;
            Empty tick = 2;
        }
    }
}
