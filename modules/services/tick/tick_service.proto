syntax = "proto3";

import "nanopb.proto";
import "service.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgTickService {
  message Config {
    /* In milliseconds */
    optional bool should_report = 1;
    uint32 delay_ms = 2;
  }

  message Invoke {
    oneof tick_invoke {
      Void start = 1;
      Void stop = 2;
      Config config = 3;
    }
  }

  message Report {
    oneof tick_report {
      MsgServiceStatus status = 1;
      Void tick = 2;
    }
  }
}
