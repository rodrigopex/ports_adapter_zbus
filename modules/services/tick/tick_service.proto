syntax = "proto3";

import "nanopb.proto";
import "service.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgTickService {
  message Config {
    uint32 delay_ms = 1;
  }

  message Invoke {
    oneof tick_invoke {
      Empty start = 1;
      Empty stop = 2;
      Empty get_status = 3;
      Config config = 4;
      Empty get_config = 5;
    }
  }

  message Report {
    oneof tick_report {
      MsgServiceStatus status = 1;
      Config config = 2;
      Empty tick = 3;
    }
  }
}
