syntax = "proto3";

import "nanopb.proto";
import "service.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgUIService {
  message Invoke {
    oneof ui_invoke {
      Empty blink = 1;
    }
  }

  message Report {
    oneof ui_report {
      Empty empty = 1;
    }
  }
}

service UIService {
  rpc blink (Empty) returns (Empty);
}
