syntax = "proto3";

import "nanopb.proto";
import "service.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgUIService {
  message Invoke {
    oneof ui_invoke {
      MsgVoid blink = 1;
    }
  }

  message Report {
    oneof ui_report {
      MsgVoid error_code = 1;
    }
  }
}
