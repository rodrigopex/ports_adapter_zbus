syntax = "proto3";

import "nanopb.proto";

option (nanopb_fileopt).anonymous_oneof = true;

message MsgBatteryService {
    message Empty {}

    message Invoke {
        oneof battery_invoke {

            Empty start = 1;
            Empty stop = 2;

        }
    }

    message Report {
        oneof battery_report {
            Empty error_code = 1;
        }
    }
}
